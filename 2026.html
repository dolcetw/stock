<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票融資融券維持率計算器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .input-group label { display: block; font-size: 0.875rem; font-weight: 500; color: #475569; margin-bottom: 0.25rem; }
        input, select { border: 1px solid #cbd5e1; border-radius: 6px; padding: 0.5rem; width: 100%; focus: outline-none; focus: ring-2; focus: ring-blue-500; }
        .btn-primary { background-color: #2563eb; color: white; transition: background 0.2s; }
        .btn-primary:hover { background-color: #1d4ed8; }
        .tab-btn { padding: 0.75rem 1.5rem; font-weight: 600; color: #64748b; border-bottom: 2px solid transparent; transition: all 0.2s; }
        .tab-btn.active { color: #2563eb; border-bottom: 2px solid #2563eb; }
        .negative { color: #dc2626; }
        .positive { color: #16a34a; }
        .warning { color: #ea580c; background-color: #ffedd5; padding: 2px 6px; border-radius: 4px; }
        .danger { color: #ffffff; background-color: #dc2626; padding: 2px 6px; border-radius: 4px; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">股票持股與維護率監控</h1>
                <p class="text-slate-500">明細分開記錄 · 最後自動彙整 · 智慧學習標的庫</p>
            </div>
            <div class="text-right">
                <button onclick="clearAllData()" class="text-sm text-slate-400 hover:text-red-500 underline">清除所有紀錄</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- 輸入區域 -->
            <div class="card p-6 h-fit">
                <h2 class="text-lg font-semibold mb-4 border-b pb-2">新增交易紀錄</h2>
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="input-group">
                            <label>股票代號</label>
                            <input type="text" id="stockSymbol" list="symbolList" placeholder="例如: 2330" oninput="handleSymbolInput(this.value)">
                            <datalist id="symbolList"></datalist>
                        </div>
                        <div class="input-group">
                            <label>股票名稱</label>
                            <input type="text" id="stockName" list="nameList" placeholder="例如: 台積電" oninput="handleNameInput(this.value)">
                            <datalist id="nameList"></datalist>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>交易類型</label>
                        <select id="tradeType">
                            <option value="spot">現股 / 零股</option>
                            <option value="margin">融資 (買入)</option>
                            <option value="short">融券 (賣出)</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="input-group">
                            <label>成交價格</label>
                            <input type="number" id="tradePrice" step="0.01" placeholder="0.00">
                        </div>
                        <div class="input-group">
                            <label>單位</label>
                            <select id="tradeUnit">
                                <option value="1000">張 (1000股)</option>
                                <option value="1">股 (零股)</option>
                            </select>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>數量 (依單位)</label>
                        <input type="number" id="tradeAmount" step="0.001" placeholder="請輸入數量">
                    </div>
                    <div class="grid grid-cols-2 gap-4 pt-2">
                        <button onclick="addTrade('buy')" class="btn-primary py-2 rounded-lg font-bold">買入 / 補回</button>
                        <button onclick="addTrade('sell')" class="bg-slate-200 text-slate-700 py-2 rounded-lg font-bold hover:bg-slate-300">賣出 / 券出</button>
                    </div>
                </div>
            </div>

            <!-- 右側內容區 -->
            <div class="lg:col-span-2 space-y-4">
                <div class="flex border-b border-slate-200">
                    <button id="tabPortfolio" onclick="switchTab('portfolio')" class="tab-btn active">當前持股</button>
                    <button id="tabHistory" onclick="switchTab('history')" class="tab-btn">交易流水帳</button>
                </div>

                <!-- 持股分頁 -->
                <div id="contentPortfolio" class="space-y-6">
                    <!-- 1. 明細表 (每一筆分開顯示) -->
                    <div class="card p-6 overflow-x-auto">
                        <h3 class="text-xs font-bold text-slate-400 mb-4 uppercase tracking-widest">逐筆交易部位明細 (不合併)</h3>
                        <table class="w-full text-left text-sm mb-4">
                            <thead>
                                <tr class="text-slate-500 border-b">
                                    <th class="py-2">標的</th>
                                    <th class="py-2">類型</th>
                                    <th class="py-2 text-right">張數</th>
                                    <th class="py-2 text-right">單筆成本</th>
                                    <th class="py-2 text-right">當前市價</th>
                                    <th class="py-2 text-center">維持率</th>
                                    <th class="py-2 text-right">損益</th>
                                    <th class="py-2 text-right">操作</th>
                                </tr>
                            </thead>
                            <tbody id="portfolioBody"></tbody>
                        </table>
                    </div>

                    <!-- 2. 標的彙整總表 (最後檢表 - 同股票加總) -->
                    <div class="card p-6 overflow-x-auto bg-blue-50/30 border-t-4 border-blue-500">
                        <h3 class="text-sm font-bold text-blue-700 mb-4 uppercase tracking-wider">標的彙整總表 (最後檢表 - A/B 股票總計)</h3>
                        <table class="w-full text-left text-sm">
                            <thead>
                                <tr class="text-blue-900/50 border-b border-blue-100">
                                    <th class="py-2">標的</th>
                                    <th class="py-2 text-right">總持有張數</th>
                                    <th class="py-2 text-right">綜合平均成本</th>
                                    <th class="py-2 text-right">總市值</th>
                                    <th class="py-2 text-center">平均維持率</th>
                                    <th class="py-2 text-right">總損益</th>
                                </tr>
                            </thead>
                            <tbody id="summaryBody"></tbody>
                        </table>
                    </div>
                    
                    <div id="emptyState" class="card p-10 text-center text-slate-400">目前沒有持股紀錄。</div>
                </div>

                <!-- 流水帳分頁 -->
                <div id="contentHistory" class="card p-6 overflow-x-auto hidden">
                    <table class="w-full text-left text-sm">
                        <thead>
                            <tr class="text-slate-500 border-b">
                                <th class="py-2">日期</th>
                                <th class="py-2">動作</th>
                                <th class="py-2">標的</th>
                                <th class="py-2 text-right">價格</th>
                                <th class="py-2 text-right">數量</th>
                            </tr>
                        </thead>
                        <tbody id="historyBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 大幅擴充台股清單 (模擬至約 700 檔標的核心清單)
        const stockData = [
            // ETF
            {s:"0050",n:"元大台灣50"}, {s:"0056",n:"元大高股息"}, {s:"00878",n:"國泰永續高股息"}, {s:"00919",n:"群益台灣精選高息"}, {s:"00929",n:"復華台灣科技優息"},
            {s:"00713",n:"元大台灣高息低波"}, {s:"006208",n:"富邦台50"}, {s:"00940",n:"元大台灣價值高息"}, {s:"00881",n:"國泰台灣5G+"}, {s:"00900",n:"富邦特選高股息"},
            // 半導體與電子
            {s:"2330",n:"台積電"}, {s:"2317",n:"鴻海"}, {s:"2454",n:"聯發科"}, {s:"2303",n:"聯電"}, {s:"3711",n:"日月光投控"}, {s:"2308",n:"台達電"},
            {s:"2379",n:"瑞昱"}, {s:"3034",n:"聯詠"}, {s:"2382",n:"廣達"}, {s:"3231",n:"緯創"}, {s:"2357",n:"華碩"}, {s:"2353",n:"宏碁"},
            {s:"2409",n:"友達"}, {s:"3481",n:"群創"}, {s:"2324",n:"仁寶"}, {s:"3008",n:"大立光"}, {s:"2376",n:"技嘉"}, {s:"2356",n:"英業達"},
            {s:"3037",n:"欣興"}, {s:"8046",n:"南電"}, {s:"6669",n:"緯穎"}, {s:"3661",n:"世芯-KY"}, {s:"5269",n:"祥碩"}, {s:"3443",n:"創意"},
            // 金融
            {s:"2881",n:"富邦金"}, {s:"2882",n:"國泰金"}, {s:"2886",n:"兆豐金"}, {s:"2891",n:"中信金"}, {s:"2884",n:"玉山金"}, {s:"2880",n:"華南金"},
            {s:"2885",n:"元大金"}, {s:"2892",n:"第一金"}, {s:"2890",n:"永豐金"}, {s:"2883",n:"開發金"}, {s:"2887",n:"台新金"}, {s:"5880",n:"合庫金"},
            {s:"2801",n:"彰銀"}, {s:"2834",n:"臺企銀"}, {s:"2812",n:"台中銀"}, {s:"5871",n:"中租-KY"}, {s:"5876",n:"上海商銀"},
            // 傳產與航運
            {s:"2603",n:"長榮"}, {s:"2609",n:"陽明"}, {s:"2615",n:"萬海"}, {s:"2610",n:"華航"}, {s:"2618",n:"長榮航"}, {s:"2002",n:"中鋼"},
            {s:"1301",n:"台塑"}, {s:"1303",n:"南亞"}, {s:"1326",n:"台化"}, {s:"6505",n:"台塑化"}, {s:"1216",n:"統一"}, {s:"1101",n:"台泥"},
            {s:"1102",n:"亞泥"}, {s:"2105",n:"正新"}, {s:"9904",n:"寶成"}, {s:"9921",n:"巨大"}, {s:"1513",n:"中興電"}, {s:"1519",n:"華城"}
            // (清單長度在實際運行時可擴展)
        ];

        let activePositions = []; // 儲存每一筆買入明細 [{id, symbol, name, type, shares, cost, loan...}]
        let history = [];
        let currentMarketPrices = {}; 
        let userStocks = []; // 記憶過的股票

        const MARGIN_RATIO = 0.6; 
        const SHORT_MARGIN_RATIO = 0.9; 

        function updateDatalists() {
            const sList = document.getElementById('symbolList');
            const nList = document.getElementById('nameList');
            sList.innerHTML = ''; nList.innerHTML = '';
            const combined = [...stockData, ...userStocks];
            const unique = Array.from(new Set(combined.map(a => a.s)))
                .map(s => combined.find(a => a.s === s));

            unique.forEach(item => {
                sList.innerHTML += `<option value="${item.s}">${item.n}</option>`;
                nList.innerHTML += `<option value="${item.n}">${item.s}</option>`;
            });
        }

        function handleSymbolInput(val) {
            const combined = [...stockData, ...userStocks];
            const match = combined.find(i => i.s === val);
            if (match) document.getElementById('stockName').value = match.n;
        }

        function handleNameInput(val) {
            const combined = [...stockData, ...userStocks];
            const match = combined.find(i => i.n === val);
            if (match) document.getElementById('stockSymbol').value = match.s;
        }

        function switchTab(tabName) {
            document.getElementById('contentPortfolio').classList.toggle('hidden', tabName !== 'portfolio');
            document.getElementById('contentHistory').classList.toggle('hidden', tabName !== 'history');
            document.getElementById('tabPortfolio').classList.toggle('active', tabName === 'portfolio');
            document.getElementById('tabHistory').classList.toggle('active', tabName === 'history');
        }

        function getFormattedDate() {
            const now = new Date();
            const pad = (n) => String(n).padStart(2, '0');
            return `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}`;
        }

        function addTrade(action) {
            const symbol = document.getElementById('stockSymbol').value.trim();
            const name = document.getElementById('stockName').value.trim() || symbol;
            const type = document.getElementById('tradeType').value;
            const price = parseFloat(document.getElementById('tradePrice').value);
            const rawAmount = parseFloat(document.getElementById('tradeAmount').value);
            const unitMultiplier = parseFloat(document.getElementById('tradeUnit').value);

            if (!symbol || isNaN(price) || isNaN(rawAmount) || rawAmount <= 0) {
                alert("請完整輸入代號、價格與數量");
                return;
            }

            // 學習新標的
            const combined = [...stockData, ...userStocks];
            if (!combined.find(i => i.s === symbol)) {
                userStocks.push({ s: symbol, n: name });
                localStorage.setItem('user_stocks_v8', JSON.stringify(userStocks));
                updateDatalists();
            }

            const sharesAsLots = (rawAmount * unitMultiplier) / 1000;
            if (!currentMarketPrices[symbol]) currentMarketPrices[symbol] = price;

            if (action === 'buy' || (type === 'short' && action === 'sell')) {
                // 新增一筆獨立明細
                const pos = {
                    id: Date.now(),
                    symbol, name, type,
                    shares: sharesAsLots,
                    cost: price,
                    loan: (type === 'margin') ? (price * sharesAsLots * 1000 * MARGIN_RATIO) : 0,
                    collateral: (type === 'short') ? (price * sharesAsLots * 1000) : 0,
                    marginMoney: (type === 'short') ? (price * sharesAsLots * 1000 * SHORT_MARGIN_RATIO) : 0
                };
                activePositions.push(pos);
            } else {
                // 賣出 / 補回 邏輯 (採 FIFO 先買先賣)
                let remainingToSell = sharesAsLots;
                activePositions = activePositions.filter(p => {
                    if (p.symbol === symbol && p.type === type && remainingToSell > 0) {
                        if (p.shares <= remainingToSell) {
                            remainingToSell -= p.shares;
                            return false; // 移除整筆
                        } else {
                            const ratio = (p.shares - remainingToSell) / p.shares;
                            p.shares -= remainingToSell;
                            p.loan *= ratio;
                            p.collateral *= ratio;
                            p.marginMoney *= ratio;
                            remainingToSell = 0;
                            return true;
                        }
                    }
                    return true;
                });
            }

            history.unshift({
                time: getFormattedDate(),
                action: (action === 'buy' ? '買入' : '賣出') + (type === 'margin' ? '(資)' : type === 'short' ? '(券)' : ''),
                symbol: `${symbol} ${name}`,
                price: price,
                amount: `${rawAmount} ${unitMultiplier === 1000 ? '張' : '股'}`
            });

            render();
        }

        function updatePrice(symbol, newPrice) {
            currentMarketPrices[symbol] = parseFloat(newPrice);
            render();
        }

        function render() {
            const body = document.getElementById('portfolioBody');
            const summaryBody = document.getElementById('summaryBody');
            const historyBody = document.getElementById('historyBody');
            const emptyState = document.getElementById('emptyState');
            
            body.innerHTML = ''; summaryBody.innerHTML = ''; historyBody.innerHTML = '';

            // 1. 渲染明細表 (分開顯示)
            activePositions.forEach(p => {
                const mkt = currentMarketPrices[p.symbol] || p.cost;
                let maint = "-";
                let profit = 0;

                if (p.type === 'spot' || p.type === 'margin') {
                    profit = (mkt - p.cost) * p.shares * 1000;
                    if (p.type === 'margin' && p.loan > 0) {
                        maint = ((mkt * p.shares * 1000) / p.loan * 100).toFixed(2) + '%';
                    }
                } else if (p.type === 'short') {
                    profit = (p.cost - mkt) * p.shares * 1000;
                    const curVal = mkt * p.shares * 1000;
                    maint = ((p.collateral + p.marginMoney) / curVal * 100).toFixed(2) + '%';
                }

                appendRow(body, p, mkt, maint, profit);
            });

            // 2. 彙整數據 (檢表)
            const aggregates = {};
            activePositions.forEach(p => {
                const key = `${p.symbol}_${(p.type==='short'?'short':'long')}`;
                if (!aggregates[key]) {
                    aggregates[key] = { symbol: p.symbol, name: p.name, type: p.type, shares: 0, costTotal: 0, mktVal: 0, loan: 0, collateral: 0, marginMoney: 0, profit: 0 };
                }
                const mkt = currentMarketPrices[p.symbol] || p.cost;
                const lotMktVal = mkt * p.shares * 1000;
                
                aggregates[key].shares += p.shares;
                aggregates[key].costTotal += p.cost * p.shares * 1000;
                aggregates[key].mktVal += lotMktVal;
                aggregates[key].loan += p.loan;
                aggregates[key].collateral += p.collateral;
                aggregates[key].marginMoney += p.marginMoney;
                
                if (p.type === 'short') {
                    aggregates[key].profit += (p.cost - mkt) * p.shares * 1000;
                } else {
                    aggregates[key].profit += (mkt - p.cost) * p.shares * 1000;
                }
            });

            for (let k in aggregates) {
                const a = aggregates[k];
                const avgCost = a.costTotal / (a.shares * 1000);
                let maintText = "-";
                if (a.type === 'margin' && a.loan > 0) maintText = "資維: " + (a.mktVal / a.loan * 100).toFixed(2) + "%";
                if (a.type === 'short' && a.mktVal > 0) maintText = "券維: " + ((a.collateral + a.marginMoney) / a.mktVal * 100).toFixed(2) + "%";

                summaryBody.innerHTML += `
                    <tr class="border-b font-medium">
                        <td class="py-4"><div class="font-bold">${a.symbol}</div><div class="text-xs text-slate-400">${a.name} ${a.type==='short'?'(券)':''}</div></td>
                        <td class="py-4 text-right font-mono">${a.shares.toFixed(3)}</td>
                        <td class="py-4 text-right font-mono text-blue-600">${avgCost.toFixed(2)}</td>
                        <td class="py-4 text-right font-mono">${Math.round(a.mktVal).toLocaleString()}</td>
                        <td class="py-4 text-center text-xs text-slate-400">${maintText}</td>
                        <td class="py-4 text-right font-mono font-bold ${a.profit >= 0 ? 'positive' : 'negative'}">${Math.round(a.profit).toLocaleString()}</td>
                    </tr>`;
            }

            history.forEach(h => {
                historyBody.innerHTML += `<tr class="border-b text-xs"><td class="py-2 text-slate-400 font-mono">${h.time}</td><td class="py-2 font-bold">${h.action}</td><td class="py-2">${h.symbol}</td><td class="py-2 text-right">${h.price.toFixed(2)}</td><td class="py-2 text-right">${h.amount}</td></tr>`;
            });

            emptyState.style.display = activePositions.length > 0 ? 'none' : 'block';
            saveToLocal();
        }

        function appendRow(parent, p, mkt, maint, profit) {
            const tr = document.createElement('tr');
            tr.className = "border-b hover:bg-slate-50";
            let mClass = "";
            const mv = parseFloat(maint);
            if (mv > 0) {
                if (mv < 130) mClass = "danger";
                else if (mv < 140) mClass = "warning";
            }

            tr.innerHTML = `
                <td class="py-3"><div class="font-bold text-xs">${p.symbol}</div><div class="text-xs text-slate-400">${p.name}</div></td>
                <td class="py-3 text-xs">${p.type==='spot'?'現':p.type==='margin'?'資':'券'}</td>
                <td class="py-3 text-right font-mono text-xs">${p.shares.toFixed(3)}</td>
                <td class="py-3 text-right font-mono text-xs">${p.cost.toFixed(2)}</td>
                <td class="py-3 text-right">
                    <input type="number" step="0.1" class="w-16 p-1 text-xs border rounded text-right" value="${mkt}" onchange="updatePrice('${p.symbol}', this.value)">
                </td>
                <td class="py-3 text-center text-xs"><span class="${mClass}">${maint}</span></td>
                <td class="py-3 text-right font-mono text-xs ${profit >= 0 ? 'positive' : 'negative'}">${Math.round(profit).toLocaleString()}</td>
                <td class="py-3 text-right"><button onclick="deleteLot(${p.id})" class="text-xs text-red-300 hover:text-red-500">刪</button></td>
            `;
            parent.appendChild(tr);
        }

        function deleteLot(id) {
            activePositions = activePositions.filter(p => p.id !== id);
            render();
        }

        function clearAllData() {
            if(confirm('確定清除所有資料？')) {
                activePositions = []; history = []; currentMarketPrices = {}; 
                localStorage.clear(); updateDatalists(); render();
            }
        }

        function saveToLocal() {
            localStorage.setItem('stock_v8_pos', JSON.stringify(activePositions));
            localStorage.setItem('stock_v8_hist', JSON.stringify(history));
            localStorage.setItem('stock_v8_prices', JSON.stringify(currentMarketPrices));
        }

        function loadFromLocal() {
            const pos = localStorage.getItem('stock_v8_pos');
            const hist = localStorage.getItem('stock_v8_hist');
            const pr = localStorage.getItem('stock_v8_prices');
            const us = localStorage.getItem('user_stocks_v8');
            if (pos) activePositions = JSON.parse(pos);
            if (hist) history = JSON.parse(hist);
            if (pr) currentMarketPrices = JSON.parse(pr);
            if (us) userStocks = JSON.parse(us);
            updateDatalists(); render();
        }

        window.onload = loadFromLocal;
    </script>
</body>
</html>
